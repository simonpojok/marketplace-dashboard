<div *ngIf="videos().length > 0" class="space-y-4">
  <h4 class="text-sm font-medium text-gray-900 dark:text-white">
    Video Details ({{ videos().length }})
  </h4>
  
  <div class="space-y-6">
    <div 
      *ngFor="let video of videos(); let i = index"
      class="border border-gray-200 dark:border-gray-700 rounded-lg p-4 space-y-4"
    >
      <!-- Video Preview Header -->
      <div class="flex items-center space-x-3">
        <div *ngIf="video.preview" class="flex-shrink-0">
          <img 
            [src]="video.preview" 
            class="w-16 h-10 object-cover rounded"
            [alt]="video.file?.name"
          />
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-sm font-medium text-gray-900 dark:text-white truncate">
            {{ video.file?.name }}
          </p>
          <p class="text-xs text-gray-500 dark:text-gray-400">
            {{ (video.file?.size || 0) | number:'1.0-0' }} bytes
          </p>
        </div>
      </div>

      <!-- Description -->
      <div>
        <label [for]="'video-desc-' + i" class="block text-sm font-medium text-gray-700 dark:text-gray-300">
          Description
        </label>
        <textarea
          [id]="'video-desc-' + i"
          [value]="video.description || ''"
          (input)="updateVideoDescription(i, $event)"
          rows="2"
          maxlength="500"
          class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-600 shadow-sm focus:border-primary-500 focus:ring-primary-500 sm:text-sm dark:bg-gray-800 dark:text-white"
          placeholder="Enter video description (optional)"
        ></textarea>
        <p class="mt-1 text-xs text-gray-500 dark:text-gray-400">
          {{ (video.description || '').length }}/500 characters
        </p>
      </div>

      <!-- Options -->
      <div class="flex items-center space-x-6">
        <div class="flex items-center">
          <input
            [id]="'video-featured-' + i"
            type="checkbox"
            [checked]="video.is_featured"
            (change)="updateVideoFeatured(i, $event)"
            class="h-4 w-4 text-primary-600 focus:ring-primary-500 border-gray-300 dark:border-gray-600 rounded"
          >
          <label [for]="'video-featured-' + i" class="ml-2 block text-sm text-gray-700 dark:text-gray-300">
            Featured Video
          </label>
        </div>

        <div class="flex items-center">
          <input
            [id]="'video-active-' + i"
            type="checkbox"
            [checked]="video.is_active"
            (change)="updateVideoActive(i, $event)"
            class="h-4 w-4 text-primary-600 focus:ring-primary-500 border-gray-300 dark:border-gray-600 rounded"
          >
          <label [for]="'video-active-' + i" class="ml-2 block text-sm text-gray-700 dark:text-gray-300">
            Active
          </label>
        </div>
      </div>
    </div>
  </div>
</div>
