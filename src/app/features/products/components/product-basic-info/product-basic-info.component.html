<div class="bg-white dark:bg-dark-bg-secondary shadow-sm rounded-lg border border-gray-200 dark:border-dark-border overflow-hidden mt-5">
  <div class="p-6">
    <h2 class="text-lg font-medium text-gray-900 dark:text-white mb-4">Basic Information</h2>

    <div class="grid grid-cols-1 gap-y-6 gap-x-4 sm:grid-cols-6" [formGroup]="formGroup">
      <!-- Product Name -->
      <div class="sm:col-span-4">
        <label for="name" class="block text-sm font-medium text-gray-700 dark:text-gray-300">
          Product Name *
        </label>
        <div class="mt-1">
          <input
            type="text"
            id="name"
            formControlName="name"
            (blur)="onNameBlur()"
            class="block w-full rounded-md border-gray-300 dark:border-gray-600 shadow-sm focus:border-primary-500 focus:ring-primary-500 sm:text-sm dark:bg-gray-800 dark:text-white"
            placeholder="Enter product name"
          >
        </div>
        <div *ngIf="formGroup.get('name')?.invalid && formGroup.get('name')?.touched"
             class="mt-1 text-sm text-red-600 dark:text-red-400">
          Product name is required and must be at least 3 characters
        </div>
      </div>

      <!-- Slug -->
      <div class="sm:col-span-2">
        <label for="slug" class="block text-sm font-medium text-gray-700 dark:text-gray-300">
          URL Slug
        </label>
        <div class="mt-1 flex rounded-md shadow-sm">
          <input
            type="text"
            id="slug"
            readonly
            formControlName="slug"
            class="block w-full rounded-md border-gray-300 dark:border-gray-600 shadow-sm focus:border-primary-500 focus:ring-primary-500 sm:text-sm dark:bg-gray-800 dark:text-white"
            placeholder="auto-generated"
          >
        </div>
        <p class="mt-1 text-xs text-gray-500 dark:text-gray-400">
          Leave empty to auto-generate
        </p>
      </div>

      <!-- SKU -->
      <div class="sm:col-span-2">
        <label for="sku" class="block text-sm font-medium text-gray-700 dark:text-gray-300">
          SKU
        </label>
        <div class="mt-1">
          <input
            type="text"
            id="sku"
            formControlName="sku"
            class="block w-full rounded-md border-gray-300 dark:border-gray-600 shadow-sm focus:border-primary-500 focus:ring-primary-500 sm:text-sm dark:bg-gray-800 dark:text-white"
            placeholder="auto-generated"
          >
        </div>
        <p class="mt-1 text-xs text-gray-500 dark:text-gray-400">
          Leave empty to auto-generate
        </p>
      </div>

      <!-- Category -->
      <div class="sm:col-span-2">
        <label for="category" class="block text-sm font-medium text-gray-700 dark:text-gray-300">
          Category *
        </label>
        <div class="mt-1">
          <select
            id="category"
            formControlName="category"
            class="block w-full rounded-md border-gray-300 dark:border-gray-600 shadow-sm focus:border-primary-500 focus:ring-primary-500 sm:text-sm dark:bg-gray-800 dark:text-white"
          >
            <option value="">Select Category</option>
            <option *ngFor="let category of categories" [value]="category.id">
              {{ category.name }}
            </option>
          </select>
        </div>
        <div *ngIf="formGroup.get('category')?.invalid && formGroup.get('category')?.touched"
             class="mt-1 text-sm text-red-600 dark:text-red-400">
          Category is required
        </div>
      </div>

      <!-- Brand -->
      <div class="sm:col-span-2">
        <label for="brand" class="block text-sm font-medium text-gray-700 dark:text-gray-300">
          Brand
        </label>
        <div class="mt-1">
          <select
            id="brand"
            formControlName="brand"
            class="block w-full rounded-md border-gray-300 dark:border-gray-600 shadow-sm focus:border-primary-500 focus:ring-primary-500 sm:text-sm dark:bg-gray-800 dark:text-white"
          >
            <option value="">No Brand</option>
            <option *ngFor="let brand of brands" [value]="brand.id">
              {{ brand.name }}
            </option>
          </select>
        </div>
      </div>

      <!-- Description -->
      <div class="sm:col-span-6">
        <label for="description" class="block text-sm font-medium text-gray-700 dark:text-gray-300">
          Description
        </label>
        <div class="mt-1">
              <textarea
                id="description"
                formControlName="description"
                rows="4"
                class="block w-full rounded-md border-gray-300 dark:border-gray-600 shadow-sm focus:border-primary-500 focus:ring-primary-500 sm:text-sm dark:bg-gray-800 dark:text-white"
                placeholder="Enter product description"
              ></textarea>
        </div>
      </div>
    </div>
  </div>
</div>
