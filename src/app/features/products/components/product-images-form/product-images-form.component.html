<div class="bg-white dark:bg-dark-bg-secondary shadow-sm rounded-lg border border-gray-200 dark:border-dark-border overflow-hidden">
  <div class="p-6">
    <div class="flex justify-between items-center mb-4">
      <h2 class="text-lg font-medium text-gray-900 dark:text-white">Product Images</h2>
      <button
        type="button"
        (click)="onImageAdded()"
        class="inline-flex items-center px-3 py-1.5 border border-transparent text-sm font-medium rounded-md text-primary-700 dark:text-primary-300 bg-primary-100 dark:bg-primary-900/30 hover:bg-primary-200 dark:hover:bg-primary-900/40 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24"
             stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
        </svg>
        Add Image
      </button>
    </div>

    <!-- Image Form Groups -->
    <div [formGroup]="parentForm" formArrayName="images">
      <!-- Drag & Drop Area -->
      <div
        *ngIf="imagesFormArray.length === 0"
        (drop)="onFileDrop($event)"
        (dragover)="onDragOver($event)"
        class="text-center py-12 border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-lg cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors"
        (click)="triggerFileInput('image-upload')"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="mx-auto h-16 w-16 text-gray-400 dark:text-gray-500"
             fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
        </svg>
        <h3 class="mt-4 text-lg font-medium text-gray-900 dark:text-white">Upload Product Images</h3>
        <p class="mt-2 text-sm text-gray-500 dark:text-gray-400">
          Click to browse or drag and drop images here
        </p>
        <p class="mt-1 text-xs text-gray-400 dark:text-gray-500">
          PNG, JPG, GIF up to 5MB each
        </p>
        <input
          id="image-upload"
          type="file"
          accept="image/*"
          multiple
          class="hidden"
          (change)="onFileInputChange($event)"
        >
      </div>

      <!-- Images Preview Grid -->
      <div *ngIf="imagesFormArray.length > 0" class="space-y-6">
        <!-- Image Grid -->
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
          <div
            *ngFor="let imageGroup of imagesFormArray.controls; let i = index"
            [formGroupName]="i"
            class="relative rounded-lg overflow-hidden group aspect-square"
          >
            <!-- Image Preview -->
            <div class="w-full h-full">
              <img
                [src]="imageGroup.get('image')?.value"
                class="object-cover w-full h-full"
                alt="Product image"
                [class.ring-2]="imageGroup.get('is_primary')?.value"
                [class.ring-primary-500]="imageGroup.get('is_primary')?.value"
              >

              <!-- Primary Badge -->
              <div *ngIf="imageGroup.get('is_primary')?.value"
                   class="absolute top-2 left-2 bg-primary-500 text-white text-xs px-2 py-1 rounded-full font-medium">
                Primary
              </div>

              <!-- Overlay with Actions -->
              <div class="absolute inset-0 bg-black bg-opacity-0 group-hover:bg-opacity-50 transition-all duration-200 flex items-center justify-center opacity-0 group-hover:opacity-100">
                <div class="flex space-x-2">
                  <button
                    type="button"
                    (click)="onPrimaryImageSet(i)"
                    class="p-2 bg-primary-500 text-white rounded-full hover:bg-primary-600 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:ring-offset-2 transition-colors"
                    title="Set as primary"
                    [class.bg-primary-700]="imageGroup.get('is_primary')?.value"
                  >
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                    </svg>
                  </button>
                  <button
                    type="button"
                    (click)="onImageRemoved(i)"
                    class="p-2 bg-red-500 text-white rounded-full hover:bg-red-600 focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-offset-2 transition-colors"
                    title="Remove image"
                  >
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                    </svg>
                  </button>
                </div>
              </div>
            </div>
          </div>

          <!-- Add More Images Button -->
          <div
            (drop)="onFileDrop($event)"
            (dragover)="onDragOver($event)"
            class="aspect-square border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-lg flex items-center justify-center cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors group"
            (click)="triggerFileInput('add-more-images')"
          >
            <div class="text-center">
              <svg xmlns="http://www.w3.org/2000/svg" class="mx-auto h-8 w-8 text-gray-400 dark:text-gray-500 group-hover:text-primary-500 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
              </svg>
              <span class="mt-2 block text-sm text-gray-500 dark:text-gray-400 group-hover:text-primary-500 transition-colors">Add more</span>
            </div>
            <input
              id="add-more-images"
              type="file"
              accept="image/*"
              multiple
              class="hidden"
              (change)="onFileInputChange($event)"
            >
          </div>
        </div>

        <!-- Image Details Form -->
        <div class="space-y-4">
          <h3 class="text-sm font-medium text-gray-900 dark:text-white">Image Details</h3>
          <div *ngFor="let imageGroup of imagesFormArray.controls; let i = index"
               class="p-4 border border-gray-200 dark:border-gray-700 rounded-lg">
            <div [formGroupName]="i" class="grid grid-cols-1 md:grid-cols-12 gap-4">
              <!-- Image Preview -->
              <div class="md:col-span-2">
                <img
                  [src]="imageGroup.get('image')?.value"
                  class="w-full h-16 object-cover rounded-md"
                  alt="Product image"
                >
              </div>

              <!-- Alt Text -->
              <div class="md:col-span-6">
                <label [for]="'alt-text-' + i" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
                  Alt Text
                </label>
                <input
                  [id]="'alt-text-' + i"
                  type="text"
                  formControlName="alt_text"
                  class="block w-full rounded-md border-gray-300 dark:border-gray-600 shadow-sm focus:border-primary-500 focus:ring-primary-500 sm:text-sm dark:bg-gray-800 dark:text-white"
                  placeholder="Describe the image for accessibility"
                >
              </div>

              <!-- Display Order -->
              <div class="md:col-span-2">
                <label [for]="'display-order-' + i"
                       class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
                  Display Order
                </label>
                <input
                  [id]="'display-order-' + i"
                  type="number"
                  formControlName="display_order"
                  min="0"
                  class="block w-full rounded-md border-gray-300 dark:border-gray-600 shadow-sm focus:border-primary-500 focus:ring-primary-500 sm:text-sm dark:bg-gray-800 dark:text-white"
                >
              </div>

              <!-- Actions -->
              <div class="md:col-span-2 flex items-end">
                <button
                  type="button"
                  (click)="onImageRemoved(i)"
                  class="w-full inline-flex justify-center items-center px-3 py-2 border border-transparent text-sm font-medium rounded-md text-red-700 dark:text-red-300 bg-red-100 dark:bg-red-900/30 hover:bg-red-200 dark:hover:bg-red-900/40 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500"
                >
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24"
                       stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                  </svg>
                  Remove
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
