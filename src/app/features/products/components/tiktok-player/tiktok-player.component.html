<div class="tiktok-player-wrapper">
  <!-- Video Player Container -->
  <div class="tiktok-player-container" *ngIf="isValidUrl && safeEmbedUrl">
    <!-- Player Controls Overlay (only shown when showControls is true) -->
    <div class="player-controls" *ngIf="showControls && !isLoading">
      <button 
        (click)="togglePlayPause()" 
        class="play-pause-btn"
        [class.playing]="isPlaying"
        [attr.aria-label]="isPlaying ? 'Pause video' : 'Play video'">
        <svg *ngIf="!isPlaying" class="play-icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M8 5v14l11-7z"/>
        </svg>
        <svg *ngIf="isPlaying" class="pause-icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
        </svg>
      </button>
    </div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" *ngIf="isLoading">
      <div class="loading-spinner"></div>
    </div>

    <!-- TikTok Player Iframe -->
    <iframe
      #playerIframe
      [src]="safeEmbedUrl"
      [style.width]="width"
      [style.height.px]="height"
      [id]="playerId"
      frameborder="0"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen"
      allowfullscreen
      loading="lazy"
      class="tiktok-iframe"
      (load)="onIframeLoad()"
      (error)="onIframeError()">
    </iframe>
  </div>

  <!-- Error State -->
  <div class="error-state" *ngIf="!isValidUrl">
    <div class="error-content">
      <svg class="error-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="15" y1="9" x2="9" y2="15"></line>
        <line x1="9" y1="9" x2="15" y2="15"></line>
      </svg>
      <p class="error-message">Unable to load TikTok video</p>
      <p class="error-description">Please check the video URL and try again</p>
    </div>
  </div>

  <!-- Initial Loading State -->
  <div class="loading-state" *ngIf="!safeEmbedUrl && !isValidUrl">
    <div class="loading-spinner"></div>
    <p class="loading-text">Loading video...</p>
  </div>
</div>
