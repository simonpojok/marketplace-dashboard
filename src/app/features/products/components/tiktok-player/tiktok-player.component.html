<div class="tiktok-player-container" *ngIf="isValidUrl && safeEmbedUrl">
  <iframe
    [src]="safeEmbedUrl"
    [style.width]="width"
    [style.height.px]="height"
    frameborder="0"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
    allowfullscreen
    loading="lazy"
    class="tiktok-iframe"
    (error)="onIframeError()">
  </iframe>
</div>

<div class="error-state" *ngIf="!isValidUrl">
  <div class="error-content">
    <svg class="error-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"></circle>
      <line x1="15" y1="9" x2="9" y2="15"></line>
      <line x1="9" y1="9" x2="15" y2="15"></line>
    </svg>
    <p class="error-message">Unable to load TikTok video</p>
    <p class="error-description">Please check the video URL and try again</p>
  </div>
</div>

<div class="loading-state" *ngIf="!safeEmbedUrl && !isValidUrl">
  <div class="loading-spinner"></div>
  <p class="loading-text">Loading video...</p>
</div>
