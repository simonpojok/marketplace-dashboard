<div class="mt-5 bg-white dark:bg-dark-bg-secondary shadow-sm rounded-lg border border-gray-200 dark:border-dark-border overflow-hidden">
    <div class="p-6">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-lg font-medium text-gray-900 dark:text-white">Product Images</h2>
            <button
                    type="button"
                    (click)="addImage()"
                    class="inline-flex items-center px-3 py-1.5 border border-transparent text-sm font-medium rounded-md text-primary-700 dark:text-primary-300 bg-primary-100 dark:bg-primary-900/30 hover:bg-primary-200 dark:hover:bg-primary-900/40 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500"
            >
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                </svg>
                Add Image
            </button>
        </div>

        <!-- Empty State -->
        <div *ngIf="imagesFormArray.length === 0" class="text-center py-8 border border-dashed border-gray-300 dark:border-gray-600 rounded-lg">
            <svg xmlns="http://www.w3.org/2000/svg" class="mx-auto h-12 w-12 text-gray-400 dark:text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
            </svg>
            <h3 class="mt-2 text-sm font-medium text-gray-900 dark:text-white">No images added</h3>
            <p class="mt-1 text-sm text-gray-500 dark:text-gray-400">Click 'Add Image' to upload product images</p>
        </div>

        <!-- Images Horizontal Scroll -->
        <div *ngIf="imagesFormArray.length > 0" class="relative">
            <div class="flex space-x-4 overflow-x-auto pb-4 scrollbar-thin scrollbar-thumb-gray-300 dark:scrollbar-thumb-gray-600">
                <div
                        *ngFor="let imageGroup of imagesGroups; let i = index"
                        [formGroup]="imageGroup"
                        class="flex-shrink-0 w-64 bg-gray-50 dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700 p-4"
                >
                    <!-- Image Preview or Upload Area -->
                    <div class="relative mb-3">
                        <!-- Existing Image Preview -->
                        <div *ngIf="getImagePreview(i)" class="relative">
                            <img
                                    [src]="getImagePreview(i)"
                                    alt="Product image"
                                    class="w-full h-32 object-cover rounded-lg border border-gray-300 dark:border-gray-600"
                            >
                            <!-- Primary Badge -->
                            <div *ngIf="imageGroup.get('is_primary')?.value"
                                 class="absolute top-2 left-2 bg-primary-500 text-white text-xs px-2 py-1 rounded-full">
                                Primary
                            </div>
                            <!-- Remove Button -->
                            <button
                                    type="button"
                                    (click)="removeImagePreview(i)"
                                    class="absolute top-2 right-2 bg-red-500 text-white rounded-full p-1 hover:bg-red-600 focus:outline-none"
                            >
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                                </svg>
                            </button>
                        </div>

                        <!-- Upload Area -->
                        <div *ngIf="!getImagePreview(i)"
                             class="border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-lg p-4 text-center"
                             (dragover)="onDragOver($event)"
                             (dragleave)="onDragLeave($event)"
                             (drop)="onDrop($event, i)"
                             [class.border-primary-500]="isDragOver()"
                             [class.bg-primary-50]="isDragOver()">
                            <svg class="mx-auto h-8 w-8 text-gray-400 dark:text-gray-500" stroke="currentColor" fill="none" viewBox="0 0 48 48">
                                <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                            <div class="mt-2">
                                <label [for]="'file-upload-' + i" class="cursor-pointer text-sm text-primary-600 dark:text-primary-400 hover:text-primary-500">
                                    Upload Image
                                    <input
                                            [id]="'file-upload-' + i"
                                            type="file"
                                            class="sr-only"
                                            accept="image/*"
                                            (change)="onFileSelected($event, i)"
                                    >
                                </label>
                            </div>
                            <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">PNG, JPG up to 10MB</p>
                        </div>
                    </div>

                    <!-- Controls -->
                    <div class="space-y-3">
                        <!-- Display Order -->
                        <div>
                            <label [for]="'order-' + i" class="block text-xs font-medium text-gray-700 dark:text-gray-300 mb-1">
                                Display Order
                            </label>
                            <input
                                    [id]="'order-' + i"
                                    type="number"
                                    formControlName="display_order"
                                    min="0"
                                    class="w-full px-2 py-1 text-sm border border-gray-300 dark:border-gray-600 rounded focus:border-primary-500 focus:ring-primary-500 dark:bg-gray-700 dark:text-white"
                            >
                        </div>

                        <!-- Primary Image Checkbox -->
                        <div class="flex items-center justify-between">
                            <div class="flex items-center">
                                <input
                                        [id]="'primary-' + i"
                                        type="checkbox"
                                        formControlName="is_primary"
                                        (change)="setPrimaryImage(i)"
                                        class="h-4 w-4 text-primary-600 border-gray-300 rounded focus:ring-primary-500"
                                >
                                <label [for]="'primary-' + i" class="ml-2 text-xs text-gray-700 dark:text-gray-300">
                                    Primary
                                </label>
                            </div>

                            <!-- Remove Image Button -->
                            <button
                                    type="button"
                                    (click)="removeImage(i)"
                                    class="text-red-600 dark:text-red-400 hover:text-red-800 dark:hover:text-red-300 focus:outline-none"
                            >
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
