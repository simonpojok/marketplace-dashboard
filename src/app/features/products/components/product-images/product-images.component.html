<div class="bg-white dark:bg-dark-bg-secondary shadow-sm rounded-lg border border-gray-200 dark:border-dark-border overflow-hidden">
    <div class="p-6">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-lg font-medium text-gray-900 dark:text-white">Product Images</h2>
            <button
                    type="button"
                    (click)="addImage()"
                    class="inline-flex items-center px-3 py-1.5 border border-transparent text-sm font-medium rounded-md text-primary-700 dark:text-primary-300 bg-primary-100 dark:bg-primary-900/30 hover:bg-primary-200 dark:hover:bg-primary-900/40 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500"
            >
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24"
                     stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                </svg>
                Add Image
            </button>
        </div>

        <!-- Image Form Groups -->
        <div>
            <div *ngIf="imagesFormArray.length === 0"
                 class="text-center py-8 border border-dashed border-gray-300 dark:border-gray-600 rounded-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="mx-auto h-12 w-12 text-gray-400 dark:text-gray-500"
                     fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                </svg>
                <h3 class="mt-2 text-sm font-medium text-gray-900 dark:text-white">No images added</h3>
                <p class="mt-1 text-sm text-gray-500 dark:text-gray-400">Click 'Add Image' to upload product images</p>
            </div>

            <div *ngFor="let imageGroup of imagesGroups; let i = index"
                 class="mb-4 p-4 border border-gray-200 dark:border-gray-700 rounded-lg">
                <div [formGroup]="imageGroup" class="space-y-4">
                    <!-- Image Preview -->
                    <div *ngIf="getImagePreview(i)" class="relative w-32 h-32 mx-auto">
                        <img
                                [src]="getImagePreview(i)"
                                [alt]="imageGroup.get('alt_text')?.value || 'Product image'"
                                class="w-full h-full object-cover rounded-lg border border-gray-300 dark:border-gray-600"
                        >
                        <button
                                type="button"
                                (click)="removeImagePreview(i)"
                                class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full p-1 hover:bg-red-600 focus:outline-none"
                        >
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                                 stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M6 18L18 6M6 6l12 12"/>
                            </svg>
                        </button>
                    </div>

                    <!-- File Upload Area -->
                    <div *ngIf="!getImagePreview(i)"
                         class="border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-lg p-6"
                         (dragover)="onDragOver($event)"
                         (dragleave)="onDragLeave($event)"
                         (drop)="onDrop($event, i)"
                         [class.border-primary-500]="isDragOver()"
                         [class.bg-primary-50]="isDragOver()"
                         [class.dark:bg-primary-900]="isDragOver()">
                        <div class="text-center">
                            <svg class="mx-auto h-12 w-12 text-gray-400 dark:text-gray-500" stroke="currentColor"
                                 fill="none" viewBox="0 0 48 48">
                                <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02"
                                      stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                            <div class="mt-4">
                                <label [for]="'file-upload-' + i" class="cursor-pointer">
                      <span class="mt-2 block text-sm font-medium text-gray-900 dark:text-white">
                        Drop an image here, or
                        <span class="text-primary-600 dark:text-primary-400 hover:text-primary-500">browse</span>
                      </span>
                                    <input
                                            [id]="'file-upload-' + i"
                                            type="file"
                                            class="sr-only"
                                            accept="image/*"
                                            (change)="onFileSelected($event, i)"
                                    >
                                </label>
                                <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">
                                    PNG, JPG, GIF up to 10MB
                                </p>
                            </div>
                        </div>
                    </div>

                    <!-- URL Input (Alternative) -->
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div class="md:col-span-2">
                            <label [for]="'image-url-' + i"
                                   class="block text-sm font-medium text-gray-700 dark:text-gray-300">
                                Or enter image URL
                            </label>
                            <input
                                    [id]="'image-url-' + i"
                                    type="url"
                                    formControlName="image"
                                    class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-600 shadow-sm focus:border-primary-500 focus:ring-primary-500 sm:text-sm dark:bg-gray-800 dark:text-white"
                                    placeholder="https://example.com/image.jpg"
                            >
                        </div>

                        <div>
                            <label [for]="'display-order-' + i"
                                   class="block text-sm font-medium text-gray-700 dark:text-gray-300">
                                Order
                            </label>
                            <input
                                    [id]="'display-order-' + i"
                                    type="number"
                                    formControlName="display_order"
                                    min="0"
                                    class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-600 shadow-sm focus:border-primary-500 focus:ring-primary-500 sm:text-sm dark:bg-gray-800 dark:text-white"
                            >
                        </div>
                    </div>

                    <!-- Alt Text -->
                    <div>
                        <label [for]="'alt-text-' + i"
                               class="block text-sm font-medium text-gray-700 dark:text-gray-300">
                            Alt Text
                        </label>
                        <input
                                [id]="'alt-text-' + i"
                                type="text"
                                formControlName="alt_text"
                                class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-600 shadow-sm focus:border-primary-500 focus:ring-primary-500 sm:text-sm dark:bg-gray-800 dark:text-white"
                                placeholder="Describe the image for accessibility"
                        >
                    </div>

                    <!-- Actions -->
                    <div class="flex justify-between items-center">
                        <div class="flex items-center">
                            <input
                                    [id]="'is-primary-' + i"
                                    type="checkbox"
                                    formControlName="is_primary"
                                    (change)="setPrimaryImage(i)"
                                    class="h-4 w-4 text-primary-600 border-gray-300 rounded focus:ring-primary-500 dark:bg-gray-800 dark:border-gray-600"
                            >
                            <label [for]="'is-primary-' + i" class="ml-2 text-sm text-gray-700 dark:text-gray-300">
                                Primary Image
                            </label>
                        </div>
                        <button
                                type="button"
                                (click)="removeImage(i)"
                                class="inline-flex items-center px-2.5 py-1.5 border border-transparent text-xs font-medium rounded text-red-700 dark:text-red-300 bg-red-100 dark:bg-red-900/30 hover:bg-red-200 dark:hover:bg-red-900/40 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500"
                        >
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24"
                                 stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                            </svg>
                            Remove
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
