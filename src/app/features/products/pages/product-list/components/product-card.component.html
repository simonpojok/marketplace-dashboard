<div
  class="bg-white dark:bg-dark-bg-secondary shadow-sm rounded-lg border border-gray-200 dark:border-dark-border overflow-hidden hover:shadow-md transition-shadow duration-200">
  <a [routerLink]="['/products/view', product().id]" class="block">
    <!-- Product Image -->
    <div class="aspect-w-1 aspect-h-1 w-full overflow-hidden bg-gray-100 dark:bg-gray-700">
      <img
        [src]="product().primary_image"
        [alt]="product().name"
        class="h-48 w-full object-cover object-center"
        onerror="this.src='assets/images/placeholder-product.png'"
      >
    </div>

    <!-- Product Info -->
    <div class="p-4">
      <div class="flex justify-between items-start">
        <div>
          <h3 class="text-sm font-medium text-gray-900 dark:text-white line-clamp-2">{{ product().name }}</h3>
          <p class="mt-1 text-xs text-gray-500 dark:text-gray-400">
            SKU: {{ product().sku }}
          </p>
        </div>
        <div class="flex items-center space-x-1">
              <span *ngIf="product().is_featured"
                    class="flex-shrink-0 inline-block px-2 py-0.5 text-xs font-medium bg-primary-100 text-primary-800 dark:bg-primary-900/30 dark:text-primary-300 rounded-full">Featured</span>
        </div>
      </div>

      <div class="flex items-center justify-between mt-2">
        <div class="flex flex-col">
          <!-- Price -->
          <div class="flex items-center">
                <span class="text-sm font-medium text-gray-900 dark:text-white"
                      [class.line-through]="product().discount_price">
                  {{ formatCurrency(product().price) }}
                </span>
            <span *ngIf="product().discount_price"
                  class="ml-2 text-sm font-medium text-green-600 dark:text-green-400">
                  {{ formatCurrency(product().discount_price || 0) }}
                </span>
          </div>
          <!-- Stock -->
          <div class="mt-1">
                <span
                  [ngClass]="
                    product().stock_quantity === 0 ? 'bg-red-100 text-red-800 dark:bg-red-900/30 dark:text-red-300' :
                    (product().stock_quantity < 10 ? 'bg-yellow-100 text-yellow-800 dark:bg-yellow-900/30 dark:text-yellow-300' :
                    'bg-green-100 text-green-800 dark:bg-green-900/30 dark:text-green-300')
                  "
                  class="px-1.5 py-0.5 text-xs font-medium rounded"
                >
                  {{ product().stock_quantity }} in stock
                </span>
          </div>
        </div>
        <div class="flex space-x-1">
          <a [routerLink]="['/products/edit', product().id]"
             class="p-1 text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-300">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                 stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/>
            </svg>
          </a>
          <button (click)="deleteProduct($event)"
                  class="p-1 text-gray-500 hover:text-red-600 dark:text-gray-400 dark:hover:text-red-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                 stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Category/Brand -->
      <div class="mt-2 text-xs text-gray-500 dark:text-gray-400 flex flex-wrap gap-2">
            <span class="inline-flex items-center">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 mr-1" fill="none" viewBox="0 0 24 24"
                   stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/>
              </svg>
              {{ getCategoryName(product().category) }}
            </span>
        <span *ngIf="product().brand" class="inline-flex items-center">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 mr-1" fill="none" viewBox="0 0 24 24"
                   stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M16 4v12l-4-2-4 2V4M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
              </svg>
          {{ getBrandName(product().brand) }}
            </span>
      </div>
    </div>
  </a>
</div>
