<div class="space-y-6">
  <!-- Loading Indicator -->
  <div *ngIf="isLoading()" class="flex justify-center py-12">
    <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-primary-500"></div>
  </div>

  <div *ngIf="!isLoading()">
    <!-- Page Header with Actions -->
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between">
      <div class="mb-5">
        <h1 class="text-2xl font-bold text-gray-900 dark:text-white">
          {{ isEdit() ? 'Edit Product' : 'Create New Product' }}
        </h1>
        <p class="mt-1 text-sm text-gray-600 dark:text-gray-300">
          {{ isEdit() ? 'Update product details and information' : 'Add a new product to your store' }}
        </p>
      </div>
      <div class="mt-4 sm:mt-0 flex gap-3">
        <a
          routerLink="/products"
          class="flex items-center justify-center px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg shadow-sm text-sm font-medium text-gray-700 dark:text-gray-200 bg-white dark:bg-dark-bg-secondary hover:bg-gray-50 dark:hover:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
          </svg>
          Cancel
        </a>
      </div>
    </div>

    <!-- Product Form -->
    <form [formGroup]="productForm" (ngSubmit)="handleCreateProduct()" class="space-y-8">
      <!-- Basic Details Component -->
      <app-product-basic-info
        [formGroup]="productForm"
        [categories]="categories()"
        [brands]="brands()"
        [isEdit]="isEdit()"
        (slugGenerated)="generateSlug()">
      </app-product-basic-info>

<!--      &lt;!&ndash; Pricing & Inventory Component &ndash;&gt;-->
<!--      <app-product-pricing-->
<!--        [formGroup]="productForm"-->
<!--        [discountPercentage]="discountPercentage()"-->
<!--        [hasVariations]="hasVariations()">-->
<!--      </app-product-pricing>-->

<!--      &lt;!&ndash; Product Images Component &ndash;&gt;-->
<!--      <app-product-images-->
<!--        [imagesFormArray]="imagesFormArray"-->
<!--        [isEdit]="isEdit()"-->
<!--        (filesChanged)="onImageFilesChanged($event)"-->
<!--        (imageRemoved)="onImageRemoved($event)">-->
<!--      </app-product-images>-->

<!--      &lt;!&ndash; Variations Component &ndash;&gt;-->
<!--      <app-product-variations-->
<!--        *ngIf="hasVariations()"-->
<!--        [variationsFormArray]="variationsFormArray">-->
<!--      </app-product-variations>-->

      <!-- Form Actions -->
      <div class="flex justify-end space-x-3">
        <a
          routerLink="/products"
          class="inline-flex justify-center py-2 px-4 border border-gray-300 dark:border-gray-600 shadow-sm text-sm font-medium rounded-md text-gray-700 dark:text-gray-200 bg-white dark:bg-dark-bg-secondary hover:bg-gray-50 dark:hover:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500"
        >
          Cancel
        </a>
        <button
          type="submit"
          [disabled]="isSaving() || productForm.invalid"
          class="inline-flex justify-center py-2 px-4 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-primary-600 hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500 disabled:opacity-50 disabled:cursor-not-allowed"
        >
          <svg *ngIf="isSaving()" class="animate-spin -ml-1 mr-2 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          {{ isSaving() ? 'Saving...' : (isEdit() ? 'Update Product' : 'Create Product') }}
        </button>
      </div>
    </form>
  </div>
</div>
