<div class="min-h-screen flex flex-col bg-gray-50 dark:bg-dark-bg-primary">
  <!-- Header with theme toggle -->
  <div class="py-4 px-6 flex items-center justify-end">
    <button
      type="button"
      class="p-2 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700"
      (click)="themeService.toggleTheme()"
      aria-label="Toggle theme"
    >
      <svg *ngIf="themeService.theme() === 'light'" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
      </svg>
      <svg *ngIf="themeService.theme() === 'dark'" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
      </svg>
    </button>
  </div>

  <!-- Main Content -->
  <div class="flex-1 flex items-center justify-center p-4">
    <div class="w-full max-w-md">
      <!-- Logo and Title -->
      <div class="text-center mb-8">
        <div class="flex justify-center">
          <img src="assets/images/logo.svg" alt="Afrisup Logo" class="h-12 w-auto" />
        </div>
        <h1 class="mt-4 text-2xl font-bold text-gray-900 dark:text-white">
          Reset Password
        </h1>
        <p class="mt-2 text-gray-600 dark:text-gray-300">
          Create a new password for your account
        </p>
      </div>

      <!-- Success Message (when submitted) -->
      <div *ngIf="resetSuccess()" class="bg-green-100 dark:bg-green-900/20 border border-green-200 dark:border-green-800 text-green-800 dark:text-green-300 p-4 rounded-lg mb-6">
        <div class="flex">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
          <div>
            <p class="text-sm">Your password has been reset successfully.</p>
            <a routerLink="/auth/login" class="block mt-2 text-sm font-medium text-primary-600 dark:text-primary-400">
              Back to Login
            </a>
          </div>
        </div>
      </div>

      <!-- Form -->
      <div *ngIf="!resetSuccess()" class="bg-white dark:bg-dark-bg-secondary shadow-md rounded-xl p-6 border border-gray-200 dark:border-dark-border">
        <form [formGroup]="resetForm" (ngSubmit)="onSubmit()">
          <!-- Phone Number field -->
          <div class="mb-4">
            <label for="phone_number" class="block mb-2 text-sm font-medium text-gray-700 dark:text-gray-300">
              Phone Number
            </label>
            <input
              type="text"
              id="phone_number"
              formControlName="phone_number"
              class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500 dark:bg-gray-800 dark:text-white"
              placeholder="+256 700 000 000"
            />
            <div *ngIf="formSubmitted() && resetForm.get('phone_number')?.errors" class="mt-1 text-sm text-red-600 dark:text-red-400">
              <span *ngIf="resetForm.get('phone_number')?.errors?.['required']">Phone number is required</span>
            </div>
          </div>

          <!-- Verification Code field -->
          <div class="mb-4">
            <label for="verification_code" class="block mb-2 text-sm font-medium text-gray-700 dark:text-gray-300">
              Verification Code
            </label>
            <input
              type="text"
              id="verification_code"
              formControlName="verification_code"
              class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500 dark:bg-gray-800 dark:text-white"
              placeholder="Enter the code sent to your phone"
            />
            <div *ngIf="formSubmitted() && resetForm.get('verification_code')?.errors" class="mt-1 text-sm text-red-600 dark:text-red-400">
              <span *ngIf="resetForm.get('verification_code')?.errors?.['required']">Verification code is required</span>
            </div>
          </div>

          <!-- New Password field -->
          <div class="mb-4">
            <label for="new_password" class="block mb-2 text-sm font-medium text-gray-700 dark:text-gray-300">
              New Password
            </label>
            <div class="relative">
              <input
                [type]="showPassword() ? 'text' : 'password'"
                id="new_password"
                formControlName="new_password"
                class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500 dark:bg-gray-800 dark:text-white"
                placeholder="Enter new password"
              />
              <button
                type="button"
                (click)="togglePasswordVisibility()"
                class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600 dark:text-gray-500 dark:hover:text-gray-300"
              >
                <svg *ngIf="!showPassword()" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                </svg>
                <svg *ngIf="showPassword()" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
                </svg>
              </button>
            </div>
            <div *ngIf="formSubmitted() && resetForm.get('new_password')?.errors" class="mt-1 text-sm text-red-600 dark:text-red-400">
              <span *ngIf="resetForm.get('new_password')?.errors?.['required']">New password is required</span>
              <span *ngIf="resetForm.get('new_password')?.errors?.['minlength']">Password must be at least 8 characters</span>
            </div>
          </div>

          <!-- Confirm Password field -->
          <div class="mb-6">
            <label for="new_password_confirm" class="block mb-2 text-sm font-medium text-gray-700 dark:text-gray-300">
              Confirm New Password
            </label>
            <input
              [type]="showPassword() ? 'text' : 'password'"
              id="new_password_confirm"
              formControlName="new_password_confirm"
              class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500 dark:bg-gray-800 dark:text-white"
              placeholder="Confirm new password"
            />
            <div *ngIf="formSubmitted() && resetForm.errors?.['passwordMismatch']" class="mt-1 text-sm text-red-600 dark:text-red-400">
              Passwords do not match
            </div>
          </div>

          <!-- Submit button -->
          <button
            type="submit"
            [disabled]="isLoading()"
            class="w-full flex justify-center items-center py-2 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-primary-600 hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500 disabled:opacity-50 disabled:cursor-not-allowed"
          >
            <svg *ngIf="isLoading()" xmlns="http://www.w3.org/2000/svg" class="animate-spin h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            {{ isLoading() ? 'Resetting...' : 'Reset Password' }}
          </button>
        </form>
      </div>

      <!-- Back to login -->
      <div *ngIf="!resetSuccess()" class="mt-6 text-center">
        <a routerLink="/auth/login" class="text-primary-600 hover:text-primary-500 dark:text-primary-400 text-sm font-medium">
          Back to Login
        </a>
      </div>
    </div>
  </div>
</div>
