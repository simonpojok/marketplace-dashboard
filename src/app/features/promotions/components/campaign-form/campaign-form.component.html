<form [formGroup]="campaignForm" (ngSubmit)="onSubmit()" class="space-y-6">
  <!-- Basic Information -->
  <div class="bg-white dark:bg-dark-bg-secondary p-6 rounded-lg border border-gray-200 dark:border-dark-border">
    <h3 class="text-lg font-medium text-gray-900 dark:text-white mb-4">Basic Information</h3>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <!-- Campaign Name -->
      <div class="md:col-span-2">
        <label for="name" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
          Campaign Name *
        </label>
        <input
          type="text"
          id="name"
          formControlName="name"
          class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500 dark:bg-gray-800 dark:text-white"
          placeholder="Enter campaign name"
        >
        <div *ngIf="campaignForm.get('name')?.invalid && campaignForm.get('name')?.touched" class="mt-1 text-sm text-red-600 dark:text-red-400">
          Campaign name is required
        </div>
      </div>

      <!-- Campaign Type -->
      <div>
        <label for="campaign_type" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
          Campaign Type *
        </label>
        <select
          id="campaign_type"
          formControlName="campaign_type"
          class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500 dark:bg-gray-800 dark:text-white"
        >
          <option value="">Select type</option>
          <option *ngFor="let type of typeOptions" [value]="type.value">{{ type.label }}</option>
        </select>
        <div *ngIf="campaignForm.get('campaign_type')?.invalid && campaignForm.get('campaign_type')?.touched" class="mt-1 text-sm text-red-600 dark:text-red-400">
          Campaign type is required
        </div>
      </div>

      <!-- Priority -->
      <div>
        <label for="priority" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
          Priority
        </label>
        <input
          type="number"
          id="priority"
          formControlName="priority"
          min="0"
          max="10"
          class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500 dark:bg-gray-800 dark:text-white"
          placeholder="0-10"
        >
      </div>

      <!-- Description -->
      <div class="md:col-span-2">
        <label for="description" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
          Description
        </label>
        <textarea
          id="description"
          formControlName="description"
          rows="3"
          class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500 dark:bg-gray-800 dark:text-white"
          placeholder="Describe your campaign"
        ></textarea>
      </div>
    </div>
  </div>

  <!-- Schedule -->
  <div class="bg-white dark:bg-dark-bg-secondary p-6 rounded-lg border border-gray-200 dark:border-dark-border">
    <h3 class="text-lg font-medium text-gray-900 dark:text-white mb-4">Schedule</h3>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <!-- Start Date -->
      <div>
        <label for="start_date" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
          Start Date *
        </label>
        <input
          type="datetime-local"
          id="start_date"
          formControlName="start_date"
          class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500 dark:bg-gray-800 dark:text-white"
        >
        <div *ngIf="campaignForm.get('start_date')?.invalid && campaignForm.get('start_date')?.touched" class="mt-1 text-sm text-red-600 dark:text-red-400">
          Start date is required
        </div>
      </div>

      <!-- End Date -->
      <div>
        <label for="end_date" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
          End Date *
        </label>
        <input
          type="datetime-local"
          id="end_date"
          formControlName="end_date"
          class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500 dark:bg-gray-800 dark:text-white"
        >
        <div *ngIf="campaignForm.get('end_date')?.invalid && campaignForm.get('end_date')?.touched" class="mt-1 text-sm text-red-600 dark:text-red-400">
          End date is required
        </div>
      </div>
    </div>
  </div>

  <!-- Usage Limits -->
  <div class="bg-white dark:bg-dark-bg-secondary p-6 rounded-lg border border-gray-200 dark:border-dark-border">
    <h3 class="text-lg font-medium text-gray-900 dark:text-white mb-4">Usage Limits</h3>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
      <!-- Max Total Usage -->
      <div>
        <label for="max_usage_total" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
          Max Total Usage
        </label>
        <input
          type="number"
          id="max_usage_total"
          formControlName="max_usage_total"
          min="1"
          class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500 dark:bg-gray-800 dark:text-white"
          placeholder="Unlimited"
        >
      </div>

      <!-- Max Usage Per User -->
      <div>
        <label for="max_usage_per_user" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
          Max Usage Per User
        </label>
        <input
          type="number"
          id="max_usage_per_user"
          formControlName="max_usage_per_user"
          min="1"
          class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500 dark:bg-gray-800 dark:text-white"
          placeholder="Unlimited"
        >
      </div>

      <!-- Minimum Order Amount -->
      <div>
        <label for="minimum_order_amount" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
          Minimum Order Amount (UGX)
        </label>
        <input
          type="number"
          id="minimum_order_amount"
          formControlName="minimum_order_amount"
          min="0"
          class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500 dark:bg-gray-800 dark:text-white"
          placeholder="No minimum"
        >
      </div>
    </div>
  </div>

  <!-- Targeting & Settings -->
  <div class="bg-white dark:bg-dark-bg-secondary p-6 rounded-lg border border-gray-200 dark:border-dark-border">
    <h3 class="text-lg font-medium text-gray-900 dark:text-white mb-4">Targeting & Settings</h3>

    <div class="space-y-4">
      <!-- Featured Campaign -->
      <div class="flex items-center">
        <input
          type="checkbox"
          id="is_featured"
          formControlName="is_featured"
          class="h-4 w-4 text-primary-600 focus:ring-primary-500 border-gray-300 rounded"
        >
        <label for="is_featured" class="ml-2 block text-sm text-gray-700 dark:text-gray-300">
          Featured Campaign (will be prominently displayed)
        </label>
      </div>

      <!-- New Customers Only -->
      <div class="flex items-center">
        <input
          type="checkbox"
          id="target_new_customers_only"
          formControlName="target_new_customers_only"
          class="h-4 w-4 text-primary-600 focus:ring-primary-500 border-gray-300 rounded"
        >
        <label for="target_new_customers_only" class="ml-2 block text-sm text-gray-700 dark:text-gray-300">
          Target new customers only
        </label>
      </div>
    </div>
  </div>

  <!-- Banner -->
  <div class="bg-white dark:bg-dark-bg-secondary p-6 rounded-lg border border-gray-200 dark:border-dark-border">
    <h3 class="text-lg font-medium text-gray-900 dark:text-white mb-4">Banner</h3>

    <div class="space-y-4">
      <!-- Banner Text -->
      <div>
        <label for="banner_text" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
          Banner Text
        </label>
        <input
          type="text"
          id="banner_text"
          formControlName="banner_text"
          class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500 dark:bg-gray-800 dark:text-white"
          placeholder="e.g., Up to 50% OFF!"
        >
      </div>

      <!-- Banner Image -->
      <div>
        <label for="banner_image" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
          Banner Image
        </label>
        <input
          type="file"
          id="banner_image"
          (change)="onFileSelected($event)"
          accept="image/*"
          class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500 dark:bg-gray-800 dark:text-white"
        >
        <p class="mt-1 text-xs text-gray-500 dark:text-gray-400">
          Recommended size: 1200x400px. Max file size: 5MB.
        </p>
      </div>

      <!-- Image Preview -->
      <div *ngIf="imagePreview" class="mt-4">
        <img [src]="imagePreview" alt="Banner preview" class="h-32 w-auto rounded-lg border border-gray-200 dark:border-gray-600">
      </div>
    </div>
  </div>

  <!-- Form Actions -->
  <div class="flex justify-end space-x-3 pt-6 border-t border-gray-200 dark:border-gray-700">
    <button
      type="button"
      (click)="onCancel()"
      class="px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg shadow-sm text-sm font-medium text-gray-700 dark:text-gray-200 bg-white dark:bg-dark-bg-secondary hover:bg-gray-50 dark:hover:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500"
    >
      Cancel
    </button>
    <button
      type="submit"
      [disabled]="campaignForm.invalid || isSubmitting"
      class="px-4 py-2 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-primary-600 hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500 disabled:opacity-50 disabled:cursor-not-allowed"
    >
      <svg *ngIf="isSubmitting" class="animate-spin -ml-1 mr-2 h-4 w-4 text-white inline-block" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
      </svg>
      {{ isSubmitting ? 'Saving...' : (isEdit ? 'Update Campaign' : 'Create Campaign') }}
    </button>
  </div>
</form>
