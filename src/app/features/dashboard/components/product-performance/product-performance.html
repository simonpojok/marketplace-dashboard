<div class="bg-white dark:bg-dark-bg-secondary shadow-sm rounded-xl border border-gray-200 dark:border-dark-border h-full">
  <div class="p-4 border-b border-gray-200 dark:border-dark-border flex items-center justify-between">
    <div>
      <h3 class="text-base font-medium text-gray-900 dark:text-white">Top Products</h3>
      <p class="text-sm text-gray-600 dark:text-gray-400">By sales volume</p>
    </div>

    <a
      routerLink="/products/list"
      class="text-sm font-medium text-primary-600 hover:text-primary-500 dark:text-primary-400"
    >
      View all
    </a>
  </div>

  <!-- Loading state -->
  <div *ngIf="isLoading" class="p-4 h-64 flex items-center justify-center">
    <div class="animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-primary-500"></div>
  </div>

  <!-- Products List -->
  <div *ngIf="!isLoading" class="divide-y divide-gray-200 dark:divide-dark-border">
    <div *ngFor="let product of productData; let i = index" class="p-4 hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors">
      <div class="flex items-center">
        <!-- Rank Number -->
        <div class="flex-shrink-0 w-8 h-8 rounded-full bg-primary-100 dark:bg-primary-900/30 text-primary-700 dark:text-primary-300 flex items-center justify-center font-medium">
          {{ i + 1 }}
        </div>

        <!-- Product Details -->
        <div class="ml-4 flex-1">
          <div class="flex items-center justify-between">
            <div>
              <h4 class="text-sm font-medium text-gray-900 dark:text-white">{{ product.name }}</h4>
              <p class="text-xs text-gray-600 dark:text-gray-400">{{ product.category }}</p>
            </div>

            <div class="text-right">
              <p class="text-sm font-medium text-gray-900 dark:text-white">{{ formatCurrency(product.sales) }}</p>
              <p class="text-xs text-gray-600 dark:text-gray-400">{{ product.quantity }} units</p>
            </div>
          </div>

          <!-- Performance Bar -->
          <div class="mt-2 w-full bg-gray-200 dark:bg-gray-700 rounded-full h-1.5">
            <div
              class="h-1.5 rounded-full"
              [ngClass]="getPerformanceColor(product.performance)"
              [style.width.%]="getPerformanceWidth(product.performance)"
            ></div>
          </div>

          <!-- Performance Percentage -->
          <div class="mt-1 flex justify-end">
                <span
                  [ngClass]="getPerformanceTextColor(product.performance)"
                  class="text-xs font-medium"
                >
                  {{ product.performance > 0 ? '+' : '' }}{{ product.performance }}%
                </span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Empty State -->
  <div *ngIf="!isLoading && productData.length === 0" class="p-8 text-center">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 mx-auto text-gray-400 dark:text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
    </svg>
    <h3 class="mt-2 text-sm font-medium text-gray-900 dark:text-white">No products</h3>
    <p class="mt-1 text-sm text-gray-500 dark:text-gray-400">Get started by adding products to your store.</p>
  </div>
</div>
