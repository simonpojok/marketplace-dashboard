<div class="bg-white dark:bg-dark-bg-secondary shadow-sm rounded-xl border border-gray-200 dark:border-dark-border overflow-hidden">
  <div class="p-4 border-b border-gray-200 dark:border-dark-border flex items-center justify-between">
    <div>
      <h3 class="text-base font-medium text-gray-900 dark:text-white">Sales Trend</h3>
      <p class="text-sm text-gray-600 dark:text-gray-400">Daily sales and orders</p>
    </div>

    <div class="flex items-center gap-2">
      <div class="flex items-center">
        <span class="w-3 h-3 rounded-full bg-primary-500 inline-block mr-1"></span>
        <span class="text-xs text-gray-600 dark:text-gray-400">Sales</span>
      </div>

      <div class="flex items-center">
        <span class="w-3 h-3 rounded-full bg-blue-500 inline-block mr-1"></span>
        <span class="text-xs text-gray-600 dark:text-gray-400">Orders</span>
      </div>

      <select
        class="ml-2 text-sm border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-dark-bg-secondary text-gray-700 dark:text-gray-300 focus:outline-none focus:ring-2 focus:ring-primary-500"
        (change)="onPeriodChange($event)"
      >
        <option value="week">Last Week</option>
        <option value="month" selected>Last Month</option>
        <option value="quarter">Last Quarter</option>
      </select>
    </div>
  </div>

  <!-- Loading state -->
  <div *ngIf="isLoading" class="h-80 flex items-center justify-center">
    <div class="animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-primary-500"></div>
  </div>

  <!-- Chart container -->
  <div *ngIf="!isLoading" class="p-4">
    <div #chartContainer class="w-full h-72 relative">
      <!-- SVG Chart will be rendered here -->
      <canvas #chartCanvas class="w-full h-full"></canvas>
    </div>
  </div>
</div>
