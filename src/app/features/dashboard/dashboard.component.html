<div class="space-y-6">
  <!-- Page Header -->
  <div class="flex flex-col md:flex-row md:items-center md:justify-between">
    <div>
      <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Dashboard</h1>
      <p class="mt-1 text-sm text-gray-600 dark:text-gray-300">
        Overview of your marketplace performance
      </p>
    </div>
    <div class="mt-4 md:mt-0 flex flex-col sm:flex-row gap-3">
      <button
        class="flex items-center justify-center px-4 py-2 border border-transparent rounded-lg text-sm font-medium text-white bg-primary-600 hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500"
        (click)="refreshData()"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
        </svg>
        Refresh
      </button>
      <button
        class="flex items-center justify-center px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg shadow-sm text-sm font-medium text-gray-700 dark:text-gray-200 bg-white dark:bg-dark-bg-secondary hover:bg-gray-50 dark:hover:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z" />
        </svg>
        Filter
      </button>
      <button
        class="flex items-center justify-center px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg shadow-sm text-sm font-medium text-gray-700 dark:text-gray-200 bg-white dark:bg-dark-bg-secondary hover:bg-gray-50 dark:hover:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
        </svg>
        Export
      </button>
    </div>
  </div>

  <!-- Loading Indicator -->
  <div *ngIf="isLoading()" class="flex justify-center items-center h-64">
    <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-primary-500"></div>
  </div>

  <!-- Dashboard Content -->
  <div *ngIf="!isLoading()" class="space-y-6">
    <!-- Stats Cards -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
      <app-stats-card
        title="Total Sales"
        [value]="dashboardData()?.summary?.totalSales || 0"
        [change]="dashboardData()?.summary?.salesChange || 0"
        icon="cash"
        format="currency"
      ></app-stats-card>

      <app-stats-card
        title="Total Orders"
        [value]="dashboardData()?.summary?.totalOrders || 0"
        [change]="dashboardData()?.summary?.ordersChange || 0"
        icon="shopping-bag"
      ></app-stats-card>

      <app-stats-card
        title="Customers"
        [value]="dashboardData()?.summary?.totalCustomers || 0"
        [change]="dashboardData()?.summary?.customersChange || 0"
        icon="users"
      ></app-stats-card>

      <app-stats-card
        title="Avg. Order Value"
        [value]="dashboardData()?.summary?.averageOrderValue || 0"
        [change]="dashboardData()?.summary?.aovChange || 0"
        icon="chart-bar"
        format="currency"
      ></app-stats-card>
    </div>

    <!-- Charts Row -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      <div class="lg:col-span-2">
        <app-sales-trend
          [salesData]="dashboardData()?.salesTrend || []"
          [isLoading]="isLoading()"
        ></app-sales-trend>
      </div>

      <div>
        <app-product-performance
          [productData]="dashboardData()?.topProducts || []"
          [isLoading]="isLoading()"
        ></app-product-performance>
      </div>
    </div>

    <!-- Tables Row -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      <div class="lg:col-span-2">
        <app-recent-orders
          [orders]="dashboardData()?.recentOrders || []"
          [isLoading]="isLoading()"
        ></app-recent-orders>
      </div>

      <div>
        <app-top-customers
          [customers]="dashboardData()?.topCustomers || []"
          [isLoading]="isLoading()"
        ></app-top-customers>
      </div>
    </div>
  </div>
</div>
