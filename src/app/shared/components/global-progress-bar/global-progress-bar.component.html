<div *ngIf="visible()" 
     class="fixed top-0 left-0 right-0 z-50 bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-700 shadow-sm">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="py-3">
      <div class="flex items-center justify-between mb-2">
        <span class="text-sm font-medium text-gray-700 dark:text-gray-300">
          {{ message() }}
        </span>
        <span class="text-sm text-gray-500 dark:text-gray-400">
          {{ progress() }}%
        </span>
      </div>
      
      <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-2">
        <div 
          class="h-2 rounded-full transition-all duration-300 ease-out"
          [class]="getProgressBarClass()"
          [style.width]="progressWidth()"
        ></div>
      </div>
      
      <div *ngIf="isCompleted()" class="mt-2 flex items-center text-green-600 dark:text-green-400">
        <svg class="w-4 h-4 mr-1" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/>
        </svg>
        <span class="text-sm font-medium">Upload completed successfully!</span>
      </div>
    </div>
  </div>
</div>
