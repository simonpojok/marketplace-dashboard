<aside
  class="h-full overflow-y-auto bg-white dark:bg-dark-bg-secondary shadow-md border-r border-gray-200 dark:border-dark-border transition-all duration-300 ease-in-out"
  [class.w-64]="!collapsed"
  [class.w-16]="collapsed"
>
  <nav class="py-4">
    <ul class="space-y-1 px-2">
      <ng-container *ngFor="let item of menuItems">
        <!-- Menu Item -->
        <li class="group relative">
          <a
            *ngIf="!item.children"
            [routerLink]="item.route"
            routerLinkActive="bg-primary-50 dark:bg-primary-900/20 text-primary-700 dark:text-primary-400"
            [routerLinkActiveOptions]="{ exact: item.route === '/dashboard' }"
            class="flex items-center px-3 py-2 rounded-lg text-gray-700 dark:text-dark-text-primary hover:bg-gray-100 dark:hover:bg-gray-700 group transition-colors duration-200"
            [title]="collapsed ? item.label : ''"
          >
            <!-- Icon with theme filtering -->
            <img
              [src]="getIconPath(item.icon)"
              [alt]="item.label"
              class="flex-shrink-0 w-5 h-5 icon-themed"
            />
            <!-- Label -->
            <span
              class="ml-3 transition-opacity duration-300"
              [class.opacity-0]="collapsed"
              [class.hidden]="collapsed"
            >{{ item.label }}</span>
          </a>

          <!-- Menu Item with Submenu -->
          <div *ngIf="item.children">
            <!-- Parent Item -->
            <button
              (click)="toggleSubMenu(item)"
              type="button"
              class="w-full flex items-center justify-between px-3 py-2 rounded-lg text-gray-700 dark:text-dark-text-primary hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors duration-200"
              [class.bg-gray-100]="item.expanded"
              [class.dark:bg-gray-700]="item.expanded"
              [title]="collapsed ? item.label : ''"
            >
              <div class="flex items-center">
                <!-- Icon with theme filtering -->
                <img
                  [src]="getIconPath(item.icon)"
                  [alt]="item.label"
                  class="flex-shrink-0 w-5 h-5 icon-themed"
                />
                <!-- Label -->
                <span
                  class="ml-3 transition-opacity duration-300"
                  [class.opacity-0]="collapsed"
                  [class.hidden]="collapsed"
                >{{ item.label }}</span>
              </div>

              <!-- Dropdown arrow -->
              <svg
                *ngIf="!collapsed"
                xmlns="http://www.w3.org/2000/svg"
                class="h-4 w-4 transition-transform duration-200"
                [class.rotate-180]="item.expanded"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
              </svg>
            </button>

            <!-- Submenu (Expanded State) -->
            <div
              *ngIf="item.expanded && !collapsed"
              class="mt-1 pl-8 space-y-1"
            >
              <a
                *ngFor="let child of item.children"
                [routerLink]="child.route"
                routerLinkActive="bg-primary-50 dark:bg-primary-900/20 text-primary-700 dark:text-primary-400"
                class="block px-3 py-2 rounded-lg text-gray-700 dark:text-dark-text-primary hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors duration-200"
              >
                <div class="flex items-center">
                  <img
                    *ngIf="child.icon"
                    [src]="getIconPath(child.icon)"
                    [alt]="child.label"
                    class="flex-shrink-0 mr-2 w-4 h-4 icon-themed"
                  />
                  {{ child.label }}
                </div>
              </a>
            </div>

            <!-- Submenu (Collapsed State - Hover Tooltip) -->
            <div
              *ngIf="collapsed && item.children"
              class="absolute left-16 top-0 bg-white dark:bg-dark-bg-secondary border border-gray-200 dark:border-dark-border rounded-lg shadow-lg py-2 z-50 min-w-48 opacity-0 pointer-events-none group-hover:opacity-100 group-hover:pointer-events-auto transition-opacity duration-200"
            >
              <div class="px-3 py-2 border-b border-gray-200 dark:border-dark-border">
                <span class="text-sm font-medium text-gray-900 dark:text-white">{{ item.label }}</span>
              </div>
              <a
                *ngFor="let child of item.children"
                [routerLink]="child.route"
                routerLinkActive="bg-primary-50 dark:bg-primary-900/20 text-primary-700 dark:text-primary-400"
                class="flex items-center px-3 py-2 text-sm text-gray-700 dark:text-dark-text-primary hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors duration-200"
              >
                <img
                  *ngIf="child.icon"
                  [src]="getIconPath(child.icon)"
                  [alt]="child.label"
                  class="flex-shrink-0 mr-2 w-4 h-4 icon-themed"
                />
                {{ child.label }}
              </a>
            </div>
          </div>
        </li>
      </ng-container>
    </ul>
  </nav>
</aside>
